<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Know Market | Sir Aditya</title>

<link rel="manifest" href="manifest.json">

<!-- PWA theme -->
<meta name="theme-color" content="#2ecc71">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- App CSS -->
<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="logo">
<img src="assets/logo.png" alt="Know Market Logo">
</div>

<div class="location">

<span class="material-icons" style="font-size:18px;margin-right:5px;">place</span>

<span id="loc-text">Detecting location...</span>

<span id="update-loc">Update</span>

</div>


<div class="search-box">

<span class="material-icons" style="color:#64748b;margin-right:8px;">search</span>

<input type="text" id="searchInput" placeholder="Search mandi items...">

</div>

</header>


<div class="live-update">
● Live Update: <span id="last-update-time">Loading...</span>
</div>


<!-- MAP -->

<div id="mapContainer"></div>


<!-- CATEGORY BAR -->

<div class="categories" id="categoryBar">

<div class="chip active">All Items</div>

<div class="chip">Vegetables</div>

<div class="chip">Grains</div>

<div class="chip">Metals</div>

</div>


<!-- ITEMS GRID -->

<div class="items-grid" id="itemsGrid"></div>


<!-- AI BUTTON -->

<div class="ai-btn" id="aiTrigger">
<span class="material-icons">smart_toy</span>
</div>


<!-- BOTTOM NAV -->

<nav class="bottom-nav">

<div class="nav-item active">
<span class="material-icons">home</span>
</div>

<div class="nav-item">
<span class="material-icons">trending_up</span>
</div>

<div class="nav-item">
<span class="material-icons">explore</span>
</div>

<div class="nav-item">
<span class="material-icons">person</span>
</div>

</nav>


<!-- AI CHAT MODAL -->

<div id="aiModal" class="modal">

<div class="modal-content">

<div class="modal-header">

<h3>
<span class="material-icons">smart_toy</span>
AI Assistant
</h3>

<span class="close-modal">&times;</span>

</div>


<div id="chatBody" class="chat-body">

<p class="ai-msg">
Namaste Sir Aditya 👋  
Main mandi prices ka analysis kar sakta hoon.  
Aap mujhse pooch sakte hain:  
"Tamatar kab sasta hoga?"
</p>

</div>


<div class="chat-input-area">

<input
type="text"
id="aiQuery"
placeholder="Ask something..."
>

<button id="sendQuery">
<span class="material-icons">send</span>
</button>

</div>

</div>

</div>


<!-- Leaflet Map JS -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


<!-- App JS -->

<script src="script.js"></script>


</body>

  </html>
